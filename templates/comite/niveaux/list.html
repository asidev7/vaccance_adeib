{% extends 'comite/base_comite.html' %}
{% block title %}Niveaux — Comité ADEIB{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-extrabold text-gray-900">Niveaux / Classes</h1>
    <a href="{% url 'niveaux:ajouter' %}" class="btn-primary text-sm">+ Ajouter</a>
</div>
<div class="card overflow-x-auto">
    <div class="table-scroll-mobile"><table>
        <thead><tr><th>Nom</th><th>Cycle</th><th>Actions</th></tr></thead>
        <tbody>
            {% for n in niveaux %}
            <tr>
                <td class="font-medium">{{ n.nom }}</td>
                <td>{{ n.get_cycle_display }}</td>
                <td>
                    <a href="{% url 'niveaux:modifier' n.id %}" class="text-primary text-sm font-semibold hover:underline">Modifier</a>
                    <a href="{% url 'niveaux:supprimer' n.id %}" class="text-red-600 text-sm font-semibold hover:underline ml-2" onclick="return confirm('Supprimer ce niveau ?')">Supprimer</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-gray-400 text-center py-8">Aucun niveau.</td></tr>
            {% endfor %}
        </tbody>
    </table></div>
</div>
{% endblock %}
