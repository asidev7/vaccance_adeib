{% extends 'base.html' %}
{% block title %}Connexion Comité — ADEIB{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="card max-w-md w-full">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-primary">ADEIB</h1>
            <p class="text-gray-500 mt-1">Espace Comité</p>
        </div>
        {% if messages %}
        <div class="space-y-2 mb-4">
            {% for message in messages %}
            <div class="px-4 py-3 rounded-md text-sm font-medium {% if message.tags == 'error' %}bg-red-50 text-red-800 border border-red-300{% else %}bg-blue-50 text-blue-800 border border-blue-300{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Nom d'utilisateur</label>
                <input type="text" name="username" id="username" class="input-field" required autofocus>
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
                <input type="password" name="password" id="password" class="input-field" required>
            </div>
            <button type="submit" class="btn-primary w-full">Se connecter</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="{% url 'core:accueil' %}" class="text-primary font-medium hover:underline">← Retour à l'accueil</a>
        </p>
    </div>
</div>
{% endblock %}
