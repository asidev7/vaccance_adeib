{% extends 'comite/base_comite.html' %}
{% block title %}Rapports — Comité ADEIB{% endblock %}
{% block content %}
<h1 class="text-2xl font-extrabold text-gray-900 mb-6">Rapports financiers</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="card">
        <h2 class="font-bold text-gray-900 mb-2">📊 Bilan financier</h2>
        <p class="text-sm text-gray-500 mb-4">Récapitulatif recettes, dépenses et solde net.</p>
        <form method="get" action="{% url 'rapports:bilan_pdf' %}" class="space-y-3">
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Session</label>
                <select name="session" class="input-field">
                    <option value="">Session active</option>
                    {% for s in sessions %}
                    <option value="{{ s.id }}">{{ s.nom }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-primary w-full">📥 Télécharger PDF</button>
        </form>
    </div>
    <div class="card">
        <h2 class="font-bold text-gray-900 mb-2">📋 Export présences</h2>
        <p class="text-sm text-gray-500 mb-4">Export Excel de toutes les présences.</p>
        <form method="get" action="{% url 'rapports:presences_excel' %}" class="space-y-3">
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Session</label>
                <select name="session" class="input-field">
                    <option value="">Session active</option>
                    {% for s in sessions %}
                    <option value="{{ s.id }}">{{ s.nom }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-primary w-full">📥 Télécharger Excel</button>
        </form>
    </div>
</div>
{% endblock %}
