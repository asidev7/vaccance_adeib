{% extends 'comite/base_comite.html' %}
{% block title %}Enregistrer un paiement — Comité ADEIB{% endblock %}
{% block content %}
<a href="{% url 'inscriptions_comite:detail_comite' inscription.id %}" class="text-primary text-sm font-semibold hover:underline mb-4 inline-block">← Retour</a>
<h1 class="text-2xl font-extrabold text-gray-900 mb-2">Enregistrer un paiement</h1>
<p class="text-gray-500 mb-6">{{ inscription.nom_eleve }} {{ inscription.prenom_eleve }} — Reste à payer : <strong class="text-red-600">{{ reste }} FCFA</strong></p>
<form method="post" class="card max-w-lg space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Montant (FCFA) *</label>
        <input type="number" name="montant" class="input-field" min="1" max="{{ reste }}" required>
    </div>
    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Méthode de paiement *</label>
        <select name="methode" class="input-field" required>
            <option value="ESPECES">Espèces</option>
            <option value="FEDAPAY_MOBILE_MONEY">FedaPay Mobile Money</option>
        </select>
    </div>
    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Référence (optionnel)</label>
        <input type="text" name="reference" class="input-field" placeholder="Réf. FedaPay ou note">
    </div>
    <button type="submit" class="btn-primary w-full">Confirmer le paiement</button>
</form>
{% endblock %}
